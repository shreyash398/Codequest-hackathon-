version: '3.8'
services:
  influxdb:
    image: influxdb:2.7
    container_name: kinetic-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=kinetic-password-123
      - DOCKER_INFLUXDB_INIT_ORG=kinetic-org
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=kinetic-super-secret-token-12345

  backend:
    build: .
    container_name: kinetic-backend
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - FLASK_ENV=production
    depends_on:
      - influxdb

volumes:
  influxdb-data:
  influxdb-config:
